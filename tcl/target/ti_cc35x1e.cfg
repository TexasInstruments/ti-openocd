source [find bitsbytes.tcl]

# Device info
if { [info exists CHIPNAME] } {
	set _CHIPNAME $CHIPNAME
} else {
	set _CHIPNAME cc35x1e
}

if { [info exists CPUTAPID] } {
	set _DAP_TAPID $CPUTAPID
} else {
	set _DAP_TAPID 0x0BB9602F
}

if { [info exists DAP_SWD_ID] } {
	set _DAP_SWD_ID $DAP_SWD_ID
} else {
	set _DAP_SWD_ID 0x0BB9602F
}

source [find target/swj-dp.tcl]

if { [using_jtag] } {
	set _DAP_ID $_DAP_TAPID
} else {
	set _DAP_ID $_DAP_SWD_ID
}

# Create and add DAP and target
swj_newdap $_CHIPNAME cpu -irlen 4 -expected-id $_DAP_ID
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

set _TARGETNAME $_CHIPNAME.cpu

target create $_TARGETNAME cortex_m  -dap $_CHIPNAME.dap


# Soft reset configuration (?)
cortex_m reset_config sysresetreq
gdb_breakpoint_override none

gdb_report_register_access_error enable

gdb_target_description enable
# Post init commands
lappend post_init_commands {echo "Open OCD for CC35x1e device successfully initialized."}
